server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Proxy bot control API to the Juky bot Express server (stream.sindrema.com).
    # The X-Watch-Proxy header authenticates the request server-side.
    # The secret never reaches the browser — it is added here by nginx only.
    location /botapi/ {
        proxy_pass https://stream.sindrema.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host stream.sindrema.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Watch-Proxy "watchdiscord-internal-v1";
        proxy_read_timeout 30s;
    }

    # Handle all routes - redirect to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
